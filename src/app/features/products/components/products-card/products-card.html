<div class="card" [class]="'card ' + estadoClass">
  <div class="card-header">
    <h3>{{ producto().nombre }}</h3>
    <span class="precio">{{ producto().precio | currency:'PEN':'S/. ' }}</span>
  </div>


  <div class="card-body">
    <ul>
      @for (variante of producto().variantes; track variante) {
        <li>
          {{ variante.nombre }} / {{ variante.color }} - Stock: {{ variante.stock }}
        </li>
      }
    </ul>
  </div>

  <div class="card-footer">
    <select (change)="onEstadoChange($event)">
      <option
        [value]="'disponible'"
        [selected]="producto().estado === 'disponible'"
      >Disponible</option>
      <option
        [value]="'agotado'"
        [selected]="producto().estado === 'agotado'"
      >Agotado</option>
      <option
        [value]="'descontinuado'"
        [selected]="producto().estado === 'descontinuado'"
      >Descontinuado</option>
    </select>

    <button (click)="onEliminar()">Eliminar</button>
  </div>
</div>
