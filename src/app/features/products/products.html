<!-- ================================
  PRODUCTOS
================================ -->
<div class="products">
  <div class="products__container">

    <!-- ================================
      FILTROS
    ================================ -->
    <products-filters
      [products]="products()"
      [activeState]="selectedState()"
      (stateChanged)="setSelectedState($event)"
    />
    <!-- END: FILTROS -->

    <!-- ================================
      CONTENIDO
    ================================ -->
    <div class="products__content">

      <!-- HERRAMIENTAS -->
      <products-tools
        (search)="searchQuery.set($event)"
        (addProduct)="openProductForm()"
      />

      @if ( productsResource.isLoading() ) {
        <!-- SKELETON -->
        <shared-skeleton-table />
      } @else {
        <!-- TABLA -->
        <products-table
          [products]="productsByState()"
          [selectedProducts]="selectedProducts()"
          [(variantPanel)]="variantPanel"
          (selectionToggled)="toggleSelection($event)"
          (allToggled)="selectAll()"
          (productKebab)="toggleProductKebab($event)"
          (variantKebab)="getVariant($event)"
          (selectionCleared)="clearSelection()"
          (editProduct)="editProduct($event)"
          (editVariant)="editVariant($event.productoId, $event.varianteId)"
          (addVariant)="openVariantForm($event)"
        />
      }

    </div>
    <!-- END: CONTENIDO -->

    <!-- ================================
      KEBAB MENU: Un producto seleccionado
    ================================ -->
    <div
      [class.active]="totalSelected() === 1"
      class="products__kebab products__kebab-main"
    >
      <!-- Ver detalles -->
      <button
        (click)="openProductDetail(productsToArchive()[0].id)"
        class="products__btn products__btn--see btn b--terciary none"
      >
        <fa-icon [icon]="faEye"></fa-icon>
        <span>Ver detalles</span>
      </button>

      <!-- Archivar -->
      <button
        (click)="archiveOrUnarchiveProducts()"
        [disabled]="archivingProducts()"
        class="products__btn products__btn--store btn b--terciary none"
      >
        @if ( archivingProducts() ) {
          <fa-icon [icon]="faSpinner" class="spin"></fa-icon>
          <span>{{ allArchived() ? 'Desarchivando...' : 'Archivando...' }}</span>
        } @else {
          <fa-icon [icon]="allArchived() ? faBoxOpen : faBoxArchive"></fa-icon>
          <span>{{ allArchived() ? 'Desarchivar' : 'Archivar' }}</span>
        }
      </button>

      <!-- Cerrar -->
      <button
        (click)="clearSelection()"
        class="products__btn products__btn--close btn b--danger none"
      >
        <fa-icon [icon]="faXmark"></fa-icon>
        <span class="sr-only">Cerrar opciones</span>
      </button>
    </div>
    <!-- END: KEBAB MENU: Un producto -->

    <!-- ================================
      KEBAB MENU: Varios productos seleccionados
    ================================ -->
    <div
      [class.active]="totalSelected() > 1"
      class="selected__products products__kebab products__kebab-main"
    >
      <span>{{ totalSelected() }} seleccionados</span>

      <!-- Archivar -->
      <button
        (click)="archiveOrUnarchiveProducts()"
        [disabled]="archivingProducts()"
        class="products__btn products__btn--store btn b--terciary none"
      >
        @if ( archivingProducts() ) {
          <fa-icon [icon]="faSpinner" class="spin"></fa-icon>
          <span>{{ allArchived() ? 'Desarchivando...' : 'Archivando...' }}</span>
        } @else {
          <fa-icon [icon]="allArchived() ? faBoxOpen : faBoxArchive"></fa-icon>
          <span>{{ allArchived() ? 'Desarchivar' : 'Archivar' }}</span>
        }
      </button>

      <!-- Cerrar -->
      <button
        (click)="clearSelection()"
        class="products__btn products__btn--close btn b--danger none"
      >
        <fa-icon [icon]="faXmark"></fa-icon>
        <span class="sr-only">Cerrar opciones</span>
      </button>
    </div>
    <!-- END: KEBAB MENU: Varios productos -->

    <!-- ================================
      KEBAB MENU: Variante
    ================================ -->
    <div
      [class.active]="variantPanel()?.tipo === 'kebab'"
      class="products__kebab products__kebab-variant"
    >
      <!-- Ver detalles -->
      <button
        (click)="openVariantDetail(
          variantPanel()!.productoId,
          variant()!.id
        )"
        class="products__btn products__btn--see btn b--terciary none"
      >
        <fa-icon [icon]="faEye"></fa-icon>
        <span>Ver detalles</span>
      </button>

      <!-- Imprimir etiqueta -->
      <button class="products__btn products__btn--print btn b--terciary none">
        <fa-icon [icon]="faBarcode"></fa-icon>
        <span>Imprimir etiqueta</span>
      </button>

      <!-- Archivar -->
      <button
        (click)="archiveOrUnarchiveVariant()"
        [disabled]="archivingVariant()"
        class="products__btn products__btn--store btn b--terciary none"
      >
        @if ( archivingVariant() ) {
          <fa-icon [icon]="faSpinner" class="spin"></fa-icon>
          <span>{{ variantIsArchived() ? 'Desarchivando...' : 'Archivando...' }}</span>
        } @else if ( variantIsArchived() ) {
          <fa-icon [icon]="faBoxOpen"></fa-icon>
          <span>Desarchivar</span>
        } @else {
          <fa-icon [icon]="faBoxArchive"></fa-icon>
          <span>Archivar</span>
        }
      </button>

      <!-- Cerrar -->
      <button
        (click)="variantPanel.set(null)"
        class="products__btn products__btn--close btn b--danger none"
      >
        <fa-icon [icon]="faXmark"></fa-icon>
        <span class="sr-only">Cerrar opciones</span>
      </button>
    </div>
    <!-- END: KEBAB MENU: Variante -->

    <!-- ================================
      STOCK: Actualizar variante
    ================================ -->
    <div
      [class.active]="variantPanel()?.tipo === 'stock'"
      class="products__stock-update"
    >
      <!-- Input de stock -->
      <div class="products__stock-update-input">
        <input
          class="input none i--terciary"
          type="number"
          name="stock_product"
          id="stock_product"
          min="0"
          placeholder="0"
          [value]="variant()?.stock ?? 0"
          #stockValue
        >
      </div>

      <!-- Guardar -->
      <button
        (click)="updateStock(stockValue.value)"
        [disabled]="updatingStock()"
        class="products__btn btn b--terciary none"
      >
        @if ( updatingStock() ) {
          <fa-icon [icon]="faSpinner" class="spin"></fa-icon>
          <span>Guardando...</span>
        } @else {
          <fa-icon [icon]="faFloppyDisk"></fa-icon>
          <span>Guardar</span>
        }
      </button>

      <!-- Cerrar -->
      <button
        (click)="variantPanel.set(null)"
        class="products__btn products__btn--close btn b--danger none"
      >
        <fa-icon [icon]="faXmark"></fa-icon>
        <span class="sr-only">Cerrar opciones</span>
      </button>
    </div>
    <!-- END: STOCK -->

  </div>
</div>
<!-- END: PRODUCTOS -->

<!-- ================================
  DRAWER - OVERLAY
================================ -->
<div
  (click)="closeAllDrawers()"
  class="drawers__overlay"
  [class.active]="
    selectedProduct() !== null ||
    showProductForm() ||
    selectedVariant() !== null ||
    showVariantForm()
  "
></div>

<!-- ================================
  DRAWER: PRODUCT DETAIL
================================ -->
<div
  [class.active]="selectedProduct() !== null"
  [class.is-covered]="selectedVariant() !== null || showVariantForm()"
  [class.no-anim]="selectedProduct() === null && ( selectedVariant() !== null || showVariantForm())"
  class="drawers drawers--product-detail"
>
  @if ( selectedProduct() !== null ) {
    <product-detail
      [product]="selectedProduct()!"
      [startInEditMode]="startInEditMode()"
      (closeModal)="closeProductDetail()"
      (productUpdated)="updateProductInList($event)"
      (editModeChanged)="syncEditMode($event)"
      (viewVariant)="openVariantDetail($event.productoId, $event.varianteId)"
      (editVariant)="editVariant($event.productoId, $event.varianteId)"
      (addVariant)="openVariantForm($event)"
    />
  }
</div>

<!-- ================================
  DRAWER: PRODUCT FORM
================================ -->
<div
  [class.active]="showProductForm()"
  class="drawers drawers--product-form"
>
  @if ( showProductForm() ) {
    <product-form
      (closeModal)="closeProductForm()"
      (productCreated)="onProductCreated($event)"
    />
  }
</div>

<!-- ================================
  DRAWER: VARIANT DETAIL
================================ -->
<div
  [class.active]="selectedVariant() !== null"
  class="drawers drawers--variant-detail"
>
  @if ( selectedVariant() !== null ) {
    <variant-detail
      [variant]="selectedVariant()!"
      [productName]="variantOwnerProduct()!.nombre"
      [productId]="variantOwnerProduct()!.id"
      [startInEditMode]="startVariantInEditMode()"
      (closeModal)="closeVariantDetail()"
      (variantUpdated)="updateProductInList($event)"
      (editModeChanged)="syncVariantEditMode($event)"
    />
  }
</div>

<!-- ================================
  DRAWER: VARIANT FORM
================================ -->
<div
  [class.active]="showVariantForm()"
  class="drawers drawers--variant-form"
>
  @if ( showVariantForm() ) {
    <variant-form
      [productId]="variantOwnerProduct()!.id"
      [productName]="variantOwnerProduct()!.nombre"
      (closeModal)="closeVariantForm()"
      (variantCreated)="onVariantCreated($event, variantOwnerProduct()!.id)"
    />
  }
</div>
