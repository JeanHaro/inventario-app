<!-- ================================
  PRODUCTOS
================================ -->
<div class="products">
  <div class="products__container">

    <!-- ================================
      FILTROS
    ================================ -->
    <app-product-filters
      [productos]="productos()"
      [estadoActivo]="estadoSeleccionado()"
      (estadoCambiado)="estadoPorProducto($event)"
    />
    <!-- END: FILTROS -->

    <!-- ================================
      CONTENIDO
    ================================ -->
    <div class="products__content">

      <!-- HERRAMIENTAS -->
      <app-products-tools (busqueda)="querySearch.set($event)"/>

      <!-- TABLA -->
      <app-products-table
        [productos]="productosPorEstado()"
        [productosSeleccionados]="productosSeleccionados()"

        [(variantePanel)]="variantePanel"
        (seleccionToggled)="toggleSeleccion($event)"
        (todasToggled)="seleccionarTodas()"
        (kebabProducto)="toggleKebabProducto($event)"
        (kebabVariante)="obtenerVariante($event)"
        (seleccionLimpiada)="limpiarSeleccion()"
      />

    </div>
    <!-- END: CONTENIDO -->

    <!-- ================================
      KEBAB MENU: Un producto seleccionado
    ================================ -->
    <div
      [class.active]="totalSeleccionados() === 1"
      class="products__kebab products__kebab-main"
    >
      <!-- Ver detalles -->
      <button
        (click)="abrirDetalleProducto(productosParaArchivar()[0].id)"
        class="products__btn products__btn--see btn b--terciary none"
      >
        <fa-icon [icon]="faEye"></fa-icon>
        <span>Ver detalles</span>
      </button>

      <!-- Archivar -->
      <button
        (click)="archivarODesarchivarProductos()"
        class="products__btn products__btn--store btn b--terciary none"
      >
        <fa-icon [icon]="todosArchivados() ? faBoxOpen : faBoxArchive"></fa-icon>
        <span>{{ todosArchivados() ? 'Desarchivar' : 'Archivar' }}</span>
      </button>

      <!-- Cerrar -->
      <button
        (click)="limpiarSeleccion()"
        class="products__btn products__btn--close btn b--danger none"
      >
        <fa-icon [icon]="faXmark"></fa-icon>
        <span class="sr-only">Cerrar opciones</span>
      </button>
    </div>
    <!-- END: KEBAB MENU: Un producto -->

    <!-- ================================
      KEBAB MENU: Varios productos seleccionados
    ================================ -->
    <div
      [class.active]="totalSeleccionados() > 1"
      class="selected__products products__kebab products__kebab-main"
    >
      <span>{{ totalSeleccionados() }} seleccionados</span>

      <!-- Archivar -->
      <button
        (click)="archivarODesarchivarProductos()"
        class="products__btn products__btn--store btn b--terciary none"
      >
        <fa-icon [icon]="todosArchivados() ? faBoxOpen : faBoxArchive"></fa-icon>
        <span>{{ todosArchivados() ? 'Desarchivar' : 'Archivar' }}</span>
      </button>

      <!-- Cerrar -->
      <button
        (click)="limpiarSeleccion()"
        class="products__btn products__btn--close btn b--danger none"
      >
        <fa-icon [icon]="faXmark"></fa-icon>
        <span class="sr-only">Cerrar opciones</span>
      </button>
    </div>
    <!-- END: KEBAB MENU: Varios productos -->

    <!-- ================================
      KEBAB MENU: Variante
    ================================ -->
    <div
      [class.active]="variantePanel()?.tipo === 'kebab'"
      class="products__kebab products__kebab-variant"
    >
      <!-- Ver detalles -->
      <button class="products__btn products__btn--see btn b--terciary none">
        <fa-icon [icon]="faEye"></fa-icon>
        <span>Ver detalles</span>
      </button>

      <!-- Historial -->
      <button class="products__btn products__btn--record btn b--terciary none">
        <fa-icon [icon]="faClockRotateLeft"></fa-icon>
        <span>Historial</span>
      </button>

      <!-- Imprimir etiqueta -->
      <button class="products__btn products__btn--print btn b--terciary none">
        <fa-icon [icon]="faBarcode"></fa-icon>
        <span>Imprimir etiqueta</span>
      </button>

      <!-- Archivar -->
      <button
        (click)="archivarODesarchivarVariante()"
        class="products__btn products__btn--store btn b--terciary none"
      >
        @if ( varianteEstaArchivada() ) {
          <fa-icon [icon]="faBoxOpen"></fa-icon>
          <span>Desarchivar</span>
        } @else {
          <fa-icon [icon]="faBoxArchive"></fa-icon>
          <span>Archivar</span>
        }
      </button>

      <!-- Cerrar -->
      <button
        (click)="variantePanel.set(null)"
        class="products__btn products__btn--close btn b--danger none"
      >
        <fa-icon [icon]="faXmark"></fa-icon>
        <span class="sr-only">Cerrar opciones</span>
      </button>
    </div>
    <!-- END: KEBAB MENU: Variante -->

    <!-- ================================
      STOCK: Actualizar variante
    ================================ -->
    <div
      [class.active]="variantePanel()?.tipo === 'stock'"
      class="products__stock-update"
    >
      <!-- Input de stock -->
      <div class="products__stock-update-input">
        <input
          class="input none i--terciary"
          type="number"
          name="stock_product"
          id="stock_product"
          min="0"
          placeholder="0"
          [value]="variante()?.stock ?? 0"
          #stockValue
        >
      </div>

      <!-- Guardar -->
      <button
        (click)="actualizarStock(stockValue.value)"
        class="products__btn btn b--terciary none"
      >
        <fa-icon [icon]="faFloppyDisk"></fa-icon>
        <span>Guardar</span>
      </button>

      <!-- Cerrar -->
      <button
        (click)="variantePanel.set(null)"
        class="products__btn products__btn--close btn b--danger none"
      >
        <fa-icon [icon]="faXmark"></fa-icon>
        <span class="sr-only">Cerrar opciones</span>
      </button>
    </div>
    <!-- END: STOCK -->

  </div>
</div>
<!-- END: PRODUCTOS -->

<!-- ================================
  MODALS - OVERLAY
================================ -->
<div
  (click)="cerrarDetalleProducto()"
  class="modals__overlay"
  [class.active]="productoSeleccionado() !== null"
></div>

<!-- ================================
  MODAL: PRODUCT DETAIL
================================ -->
<div
  [class.active]="productoSeleccionado() !== null"
  class="modals modals--product-detail"
>
  <app-product-detail [producto]="productoSeleccionado()!" />
</div>
